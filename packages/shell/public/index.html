<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Drone Job Manager</title>
</head>

<body>
    <div id="root">
        <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#09090b;">
            <div style="display:flex;gap:6px;">
                <span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:b 1.2s ease-in-out infinite;"></span>
                <span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:b 1.2s ease-in-out 0.2s infinite;"></span>
                <span style="width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:b 1.2s ease-in-out 0.4s infinite;"></span>
            </div>
            <style>@keyframes b{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}</style>
        </div>
    </div>
</body>

</html>
